{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Parking Details</title>

    <link rel="stylesheet" href="{% static 'css/parking_details-style.css' %}">
</head>

<body>

{% include 'nav2.html' %}

<div class="container">

    <div class="card">

        <h2>{{ p.name }}</h2>

        <p>📍 {{ p.address }}</p>

        <p>💰 ₹{{ p.price }} / hr</p>

        <p>🅿 Available Slots: {{ p.available_slots }}</p>

        <button onclick="bookParking({{ p.id }})" class="book-btn">
            Book Now
        </button>

    </div>

</div>

<script>
function bookParking(id) {
    fetch("/api/book-parking/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            parking_id: id
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || data.error);
        location.reload();
    });
}
</script>

{% include 'footer.html' %}

</body>
</html>
